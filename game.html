<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CROSS THE ROAD</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --neon-green: #39ff14;
  --neon-cyan: #00ffee;
  --neon-yellow: #ffe600;
  --neon-pink: #ff2d78;
  --bg: #060606;
}

html, body {
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', Courier, monospace;
  color: #fff;
  overflow: hidden;
  touch-action: none;
}

/* CRT scanlines */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.12) 3px,
    rgba(0,0,0,0.12) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* Vignette */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.65) 100%);
  pointer-events: none;
  z-index: 9998;
}

.title {
  font-size: clamp(16px, 4vw, 34px);
  letter-spacing: 0.35em;
  color: var(--neon-green);
  text-shadow: 0 0 8px var(--neon-green), 0 0 24px var(--neon-green);
  margin-bottom: 8px;
  text-transform: uppercase;
}

.hud {
  display: flex;
  gap: clamp(12px, 3vw, 30px);
  margin-bottom: 8px;
  font-size: clamp(11px, 2vw, 16px);
  letter-spacing: 0.12em;
}

.hud-score {
  color: var(--neon-cyan);
  text-shadow: 0 0 6px var(--neon-cyan);
}

.hud-lives {
  color: var(--neon-pink);
  text-shadow: 0 0 6px var(--neon-pink);
}

.hud-best {
  color: var(--neon-yellow);
  text-shadow: 0 0 6px var(--neon-yellow);
}

.game-wrapper {
  position: relative;
  display: inline-block;
}

#gameCanvas {
  display: block;
  border: 2px solid var(--neon-green);
  box-shadow: 0 0 16px var(--neon-green), 0 0 48px rgba(57,255,20,0.18), inset 0 0 30px rgba(0,0,0,0.8);
  image-rendering: pixelated;
}

/* Overlays */
.overlay {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.82);
  z-index: 100;
  flex-direction: column;
  gap: 14px;
}

.overlay.active { display: flex; }

.overlay-box {
  border: 2px solid var(--neon-green);
  box-shadow: 0 0 24px var(--neon-green), 0 0 60px rgba(57,255,20,0.15);
  padding: 28px 44px;
  text-align: center;
  background: rgba(0,0,0,0.92);
}

.overlay h2 {
  font-size: clamp(20px, 5vw, 36px);
  letter-spacing: 0.3em;
  color: var(--neon-green);
  text-shadow: 0 0 10px var(--neon-green), 0 0 28px var(--neon-green);
  margin-bottom: 14px;
}

.overlay p {
  color: var(--neon-cyan);
  font-size: clamp(11px, 2vw, 14px);
  letter-spacing: 0.1em;
  margin-bottom: 6px;
  text-shadow: 0 0 5px var(--neon-cyan);
}

.overlay .sub {
  color: #888;
  font-size: clamp(10px, 1.5vw, 12px);
}

.action-btn {
  margin-top: 16px;
  padding: 10px 28px;
  background: transparent;
  border: 2px solid var(--neon-yellow);
  color: var(--neon-yellow);
  font-family: 'Courier New', monospace;
  font-size: clamp(13px, 2.5vw, 17px);
  letter-spacing: 0.2em;
  cursor: pointer;
  text-shadow: 0 0 4px rgba(255,230,0,0.6);
  box-shadow: 0 0 8px rgba(255,230,0,0.12);
  transition: background 0.15s, box-shadow 0.15s;
}

.action-btn:hover, .action-btn:active {
  background: rgba(255,230,0,0.1);
  box-shadow: 0 0 16px rgba(255,230,0,0.3);
}

.blink { animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* D-pad */
.dpad {
  margin-top: 12px;
  display: grid;
  grid-template-areas:
    ". up ."
    "left . right"
    ". down .";
  gap: 4px;
}

.dpad-btn {
  width: clamp(44px, 10vw, 56px);
  height: clamp(44px, 10vw, 56px);
  background: rgba(57,255,20,0.07);
  border: 2px solid rgba(57,255,20,0.5);
  border-radius: 6px;
  color: var(--neon-green);
  font-size: clamp(16px, 4vw, 22px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  text-shadow: 0 0 6px var(--neon-green);
  box-shadow: 0 0 8px rgba(57,255,20,0.15);
  transition: background 0.08s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.dpad-btn:active { background: rgba(57,255,20,0.28); }
.dpad-btn.up    { grid-area: up; }
.dpad-btn.left  { grid-area: left; }
.dpad-btn.right { grid-area: right; }
.dpad-btn.down  { grid-area: down; }
</style>
</head>
<body>

<div class="title">&#9733; CROSS THE ROAD &#9733;</div>
<div class="hud">
  <div class="hud-score">SCORE&nbsp;<span id="scoreVal">0</span></div>
  <div class="hud-lives" id="livesVal">♥ ♥ ♥</div>
  <div class="hud-best">BEST&nbsp;<span id="bestVal">0</span></div>
</div>

<div class="game-wrapper">
  <canvas id="gameCanvas"></canvas>

  <!-- Start -->
  <div class="overlay active" id="startOverlay">
    <div class="overlay-box">
      <h2>CROSS THE ROAD</h2>
      <p>Dodge traffic &amp; reach the top to score</p>
      <p>You have 3 lives. Speed increases each round!</p>
      <p class="sub" style="margin-top:8px">Arrow keys or D-pad to move</p>
      <button class="action-btn blink" id="btnStart">&#9654; START</button>
    </div>
  </div>

  <!-- Death -->
  <div class="overlay" id="deathOverlay">
    <div class="overlay-box">
      <h2>SPLAT!</h2>
      <p id="deathMsg"></p>
      <button class="action-btn" id="btnContinue">&#9654; CONTINUE</button>
    </div>
  </div>

  <!-- Win -->
  <div class="overlay" id="winOverlay">
    <div class="overlay-box">
      <h2>MADE IT!</h2>
      <p id="winMsg"></p>
      <p class="sub">Speed increased!</p>
      <button class="action-btn" id="btnNext">&#9654; NEXT ROUND</button>
    </div>
  </div>

  <!-- Game Over -->
  <div class="overlay" id="gameOverOverlay">
    <div class="overlay-box">
      <h2>GAME OVER</h2>
      <p id="goScore"></p>
      <p id="goBest"></p>
      <button class="action-btn blink" id="btnRestart">&#9654; PLAY AGAIN</button>
    </div>
  </div>
</div>

<div class="dpad">
  <button class="dpad-btn up"    id="dUp">&#9650;</button>
  <button class="dpad-btn left"  id="dLeft">&#9664;</button>
  <button class="dpad-btn right" id="dRight">&#9654;</button>
  <button class="dpad-btn down"  id="dDown">&#9660;</button>
</div>

<script>
// ─────────────────────────────────────────────
//  Constants & layout
// ─────────────────────────────────────────────
const COLS = 13;
const ROWS = 9;

// Row 0 = top (HOME), Row 8 = bottom (START)
//  Types: 'home' | 'road' | 'safe' | 'start'
const ROW_TYPE = ['home','road','road','road','safe','road','road','road','start'];
// Direction vehicles travel: 1 = right, -1 = left, 0 = none
const LANE_DIR  = [0, 1, -1, 1, 0, -1, 1, -1, 0];
// Base speed (cells per second) for each row
const LANE_SPEED= [0, 2.4, 1.9, 2.8, 0, 2.1, 2.7, 1.8, 0];
// Whether lane uses trucks (wide) instead of cars
const LANE_TRUCK= [false, false, true, false, false, true, false, false, false];
// Vehicles per lane
const LANE_COUNT= [0, 3, 2, 3, 0, 2, 3, 3, 0];

const CAR_COLORS   = ['#ff3c3c','#ff8c00','#ffde00','#3ecfff','#ff45b5','#00ffc6','#ff6b35','#b44fff'];
const TRUCK_COLORS = ['#ff2222','#0088ff','#ff0077','#ff9900'];

// ─────────────────────────────────────────────
//  Canvas sizing
// ─────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function cellSize() {
  const mw = Math.min(window.innerWidth - 20, 780);
  const mh = Math.min(window.innerHeight - 200, 600);
  return Math.max(36, Math.floor(Math.min(mw / COLS, mh / ROWS)));
}

let CELL = cellSize();
function resizeCanvas() {
  CELL = cellSize();
  canvas.width  = COLS * CELL;
  canvas.height = ROWS * CELL;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); syncPlayerPixels(); });

// ─────────────────────────────────────────────
//  Game state
// ─────────────────────────────────────────────
let gameState = 'idle'; // idle | playing | dead | win | gameover
let score = 0, best = 0, lives = 3, difficulty = 1;

// Player
const player = {
  col: 6, row: 8,
  x: 0, y: 0,
  fromX: 0, fromY: 0,
  targetX: 0, targetY: 0,
  t: 1,           // 0..1 animation progress (1 = arrived)
  dead: false,
  deadTimer: 0,
  winAnim: false,
  winTimer: 0,
};

function syncPlayerPixels() {
  player.x = player.col * CELL;
  player.y = player.row * CELL;
  player.targetX = player.x;
  player.targetY = player.y;
  player.fromX = player.x;
  player.fromY = player.y;
}

// Vehicles
let vehicles = [];

function spawnVehicles() {
  vehicles = [];
  for (let row = 1; row < ROWS - 1; row++) {
    if (ROW_TYPE[row] !== 'road') continue;
    const dir   = LANE_DIR[row];
    const speed = LANE_SPEED[row] * difficulty;
    const truck = LANE_TRUCK[row];
    const count = LANE_COUNT[row];
    const vw    = truck ? 2 : 1;
    const spacing = (COLS * CELL) / count;

    for (let i = 0; i < count; i++) {
      // Stagger initial positions
      let startX = i * spacing + (Math.random() * spacing * 0.3);
      if (dir < 0) startX = COLS * CELL - startX - vw * CELL;
      vehicles.push({
        row,
        x: startX,
        vw,                          // width in cells
        color: truck
          ? TRUCK_COLORS[i % TRUCK_COLORS.length]
          : CAR_COLORS[(row * 5 + i * 3) % CAR_COLORS.length],
        speed: speed * dir,          // px/cell-size per second — scaled later
        truck,
      });
    }
  }
}

// ─────────────────────────────────────────────
//  Controls
// ─────────────────────────────────────────────
let moveQueue = [];

document.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
    e.preventDefault();
    moveQueue.push(e.key);
  }
  if (e.key === 'Enter' || e.key === ' ') {
    handleAction();
  }
});

function dpad(key) {
  moveQueue.push(key);
  handleAction();
}

document.getElementById('dUp').addEventListener('mousedown', () => dpad('ArrowUp'));
document.getElementById('dDown').addEventListener('mousedown', () => dpad('ArrowDown'));
document.getElementById('dLeft').addEventListener('mousedown', () => dpad('ArrowLeft'));
document.getElementById('dRight').addEventListener('mousedown', () => dpad('ArrowRight'));
['dUp','dDown','dLeft','dRight'].forEach(id => {
  const el = document.getElementById(id);
  const dir = {dUp:'ArrowUp',dDown:'ArrowDown',dLeft:'ArrowLeft',dRight:'ArrowRight'}[id];
  el.addEventListener('touchstart', e => { e.preventDefault(); moveQueue.push(dir); }, {passive:false});
});

// Swipe support
let swipeStart = null;
canvas.addEventListener('touchstart', e => {
  swipeStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, {passive:true});
canvas.addEventListener('touchend', e => {
  if (!swipeStart) return;
  const dx = e.changedTouches[0].clientX - swipeStart.x;
  const dy = e.changedTouches[0].clientY - swipeStart.y;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    moveQueue.push(dx > 0 ? 'ArrowRight' : 'ArrowLeft');
  } else {
    moveQueue.push(dy > 0 ? 'ArrowDown' : 'ArrowUp');
  }
  swipeStart = null;
}, {passive:true});

function handleAction() {
  if (gameState === 'idle')     startGame();
  else if (gameState === 'gameover') startGame();
}

// ─────────────────────────────────────────────
//  Game lifecycle
// ─────────────────────────────────────────────
function startGame() {
  score = 0; lives = 3; difficulty = 1;
  spawnVehicles();
  resetPlayer();
  setGameState('playing');
  updateHUD();
}

function resetPlayer() {
  player.col = 6; player.row = 8;
  player.dead = false; player.deadTimer = 0;
  player.winAnim = false; player.winTimer = 0;
  player.t = 1;
  syncPlayerPixels();
  moveQueue = [];
}

function setGameState(s) {
  gameState = s;
  document.getElementById('startOverlay').classList.toggle('active', s === 'idle');
  document.getElementById('deathOverlay').classList.toggle('active', s === 'dead');
  document.getElementById('winOverlay').classList.toggle('active', s === 'win');
  document.getElementById('gameOverOverlay').classList.toggle('active', s === 'gameover');
}

function updateHUD() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('bestVal').textContent = best;
  const hearts = '\u2665'.repeat(lives) + '\u2661'.repeat(Math.max(0, 3 - lives));
  document.getElementById('livesVal').textContent = hearts.split('').join(' ');
}

// Overlay buttons
document.getElementById('btnStart').addEventListener('click', startGame);
document.getElementById('btnRestart').addEventListener('click', startGame);
document.getElementById('btnContinue').addEventListener('click', () => {
  resetPlayer();
  setGameState('playing');
});
document.getElementById('btnNext').addEventListener('click', () => {
  resetPlayer();
  spawnVehicles();
  setGameState('playing');
});

// ─────────────────────────────────────────────
//  Movement
// ─────────────────────────────────────────────
function tryMove(key) {
  if (player.t < 1 || player.dead || gameState !== 'playing') return;
  let dr = 0, dc = 0;
  if (key === 'ArrowUp')    dr = -1;
  if (key === 'ArrowDown')  dr =  1;
  if (key === 'ArrowLeft')  dc = -1;
  if (key === 'ArrowRight') dc =  1;
  const nr = player.row + dr;
  const nc = player.col + dc;
  if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) return;
  player.fromX = player.x;
  player.fromY = player.y;
  player.col = nc; player.row = nr;
  player.targetX = nc * CELL;
  player.targetY = nr * CELL;
  player.t = 0;
}

// ─────────────────────────────────────────────
//  Collision
// ─────────────────────────────────────────────
function checkCollision() {
  const pad = CELL * 0.18;
  const px1 = player.x + pad, py1 = player.y + pad;
  const px2 = player.x + CELL - pad, py2 = player.y + CELL - pad;
  for (const v of vehicles) {
    if (v.row !== player.row) continue;
    const vx1 = v.x;
    const vy1 = v.row * CELL + 2;
    const vx2 = v.x + v.vw * CELL - 2;
    const vy2 = vy1 + CELL - 4;
    if (px1 < vx2 && px2 > vx1 && py1 < vy2 && py2 > vy1) return true;
  }
  return false;
}

// ─────────────────────────────────────────────
//  Game loop
// ─────────────────────────────────────────────
let prevTime = 0;
function loop(ts) {
  const dt = Math.min((ts - prevTime) / 1000, 0.05);
  prevTime = ts;

  if (gameState === 'playing') {
    // Move vehicles
    for (const v of vehicles) {
      v.x += v.speed * CELL * dt;
      const wrap = COLS * CELL + v.vw * CELL + 20;
      if (v.speed > 0 && v.x >  COLS * CELL + 20) v.x = -(v.vw * CELL + 10);
      if (v.speed < 0 && v.x < -(v.vw * CELL + 20)) v.x = COLS * CELL + 10;
    }

    // Process input
    if (moveQueue.length > 0 && player.t >= 1 && !player.dead) {
      tryMove(moveQueue.shift());
    }

    // Animate player
    if (player.t < 1) {
      player.t = Math.min(player.t + dt * 11, 1);
      const e = easeOut(player.t);
      player.x = lerp(player.fromX, player.targetX, e);
      player.y = lerp(player.fromY, player.targetY, e);
    }

    // Collision check (continuous)
    if (!player.dead && ROW_TYPE[player.row] === 'road') {
      if (checkCollision()) {
        player.dead = true;
        player.deadTimer = 1.0;
        player.t = 1;
      }
    }

    // Death countdown
    if (player.dead) {
      player.deadTimer -= dt;
      if (player.deadTimer <= 0) {
        lives--;
        best = Math.max(best, score);
        updateHUD();
        if (lives <= 0) {
          document.getElementById('goScore').textContent = 'SCORE: ' + score;
          document.getElementById('goBest').textContent  = 'BEST: '  + best;
          setGameState('gameover');
        } else {
          document.getElementById('deathMsg').textContent =
            'Lives remaining: ' + '♥'.repeat(lives) + '♡'.repeat(3 - lives);
          setGameState('dead');
        }
      }
    }

    // Win check
    if (!player.dead && player.t >= 1 && player.row === 0) {
      score++;
      difficulty = 1 + score * 0.18;
      best = Math.max(best, score);
      updateHUD();
      document.getElementById('winMsg').textContent = 'Score: ' + score;
      setGameState('win');
    }
  }

  render(ts);
  requestAnimationFrame(loop);
}

function lerp(a, b, t) { return a + (b - a) * t; }
function easeOut(t) { return 1 - Math.pow(1 - t, 2.4); }

// ─────────────────────────────────────────────
//  Rendering
// ─────────────────────────────────────────────
function render(ts) {
  const t = ts / 1000;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let row = 0; row < ROWS; row++) {
    drawRow(row, t);
  }

  drawVehicles(t);
  drawPlayer(t);
}

function drawRow(row, t) {
  const y = row * CELL;
  const type = ROW_TYPE[row];

  if (type === 'road') {
    // Base asphalt
    ctx.fillStyle = '#181818';
    ctx.fillRect(0, y, canvas.width, CELL);

    // Subtle asphalt texture
    ctx.fillStyle = '#1d1d1d';
    for (let c = 0; c < COLS; c++) {
      if ((c + row) % 3 !== 0) ctx.fillRect(c * CELL, y, CELL, CELL);
    }

    // Dashed center line
    ctx.save();
    ctx.strokeStyle = 'rgba(255,230,0,0.55)';
    ctx.lineWidth = Math.max(1.5, CELL * 0.04);
    ctx.setLineDash([CELL * 0.35, CELL * 0.45]);
    ctx.beginPath();
    ctx.moveTo(0, y + CELL * 0.5);
    ctx.lineTo(canvas.width, y + CELL * 0.5);
    ctx.stroke();
    ctx.restore();

    // Edge lines
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(0, y, canvas.width, 1);
    ctx.fillRect(0, y + CELL - 1, canvas.width, 1);

  } else {
    // Grass
    ctx.fillStyle = '#0b260b';
    ctx.fillRect(0, y, canvas.width, CELL);

    // Grass blade pattern
    ctx.fillStyle = '#0e2e0e';
    for (let c = 0; c < COLS; c++) {
      if ((c * 7 + row * 13) % 6 < 3) {
        ctx.fillRect(c * CELL + 3, y + 3, CELL - 6, CELL - 6);
      }
    }

    if (type === 'home') {
      // Pulsing glow for home zone
      const pulse = 0.4 + 0.25 * Math.sin(t * 2.5);
      const grad = ctx.createLinearGradient(0, y, 0, y + CELL);
      grad.addColorStop(0, `rgba(57,255,20,${pulse})`);
      grad.addColorStop(1, 'rgba(57,255,20,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, y, canvas.width, CELL);

      ctx.save();
      ctx.fillStyle = '#39ff14';
      ctx.shadowColor = '#39ff14';
      ctx.shadowBlur = 12;
      ctx.font = `bold ${Math.floor(CELL * 0.38)}px 'Courier New', monospace`;
      ctx.textAlign = 'center';
      ctx.fillText('H O M E', canvas.width / 2, y + CELL * 0.67);
      ctx.restore();

    } else if (type === 'start') {
      ctx.save();
      ctx.fillStyle = 'rgba(57,255,20,0.55)';
      ctx.font = `bold ${Math.floor(CELL * 0.35)}px 'Courier New', monospace`;
      ctx.textAlign = 'center';
      ctx.fillText('S T A R T', canvas.width / 2, y + CELL * 0.67);
      ctx.restore();

    } else if (type === 'safe') {
      // Median strip with dashes
      ctx.save();
      ctx.strokeStyle = 'rgba(57,255,20,0.25)';
      ctx.lineWidth = 1;
      ctx.setLineDash([CELL * 0.4, CELL * 0.4]);
      ctx.beginPath();
      ctx.moveTo(0, y + CELL * 0.5);
      ctx.lineTo(canvas.width, y + CELL * 0.5);
      ctx.stroke();
      ctx.restore();
    }
  }
}

function drawVehicles(t) {
  for (const v of vehicles) {
    const x  = v.x;
    const y  = v.row * CELL;
    const w  = v.vw * CELL;
    const h  = CELL;
    const goRight = v.speed > 0;

    const pad = 3;
    drawVehicleShape(ctx, x + pad, y + pad, w - pad * 2, h - pad * 2,
                     v.color, v.truck, goRight, t);
  }
}

function drawVehicleShape(ctx, x, y, w, h, color, truck, goRight, t) {
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur  = 10;

  // Body
  ctx.fillStyle = color;
  rrect(ctx, x, y, w, h, truck ? 5 : 7);
  ctx.fill();

  // Roof / cab
  const cabW = truck ? w * 0.28 : w * 0.52;
  const cabX = truck
    ? (goRight ? x + w - cabW - 2 : x + 2)
    : x + (w - cabW) / 2;
  ctx.fillStyle = lighten(color, 0.22);
  rrect(ctx, cabX, y + h * 0.18, cabW, h * 0.5, 4);
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#111';
  ctx.shadowBlur = 0;
  const wheelR = h * 0.18;
  const wy = y + h - wheelR * 0.6;
  ctx.beginPath(); ctx.arc(x + w * 0.22, wy, wheelR, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + w * 0.78, wy, wheelR, 0, Math.PI * 2); ctx.fill();
  if (truck) {
    ctx.beginPath(); ctx.arc(x + w * 0.5, wy, wheelR, 0, Math.PI * 2); ctx.fill();
  }

  // Headlights / taillights
  ctx.shadowBlur = 14;
  const frontX = goRight ? x + w - 4 : x;
  const rearX  = goRight ? x : x + w - 4;
  ctx.fillStyle = '#ffffbb';
  ctx.shadowColor = '#ffff88';
  ctx.fillRect(frontX, y + h * 0.22, 4, h * 0.28);
  ctx.fillRect(frontX, y + h * 0.58, 4, h * 0.22);

  ctx.fillStyle = '#ff3300';
  ctx.shadowColor = '#ff4400';
  ctx.fillRect(rearX, y + h * 0.22, 4, h * 0.28);
  ctx.fillRect(rearX, y + h * 0.58, 4, h * 0.22);

  ctx.restore();
}

function drawPlayer(t) {
  if (gameState !== 'playing' && gameState !== 'win') return;

  const dead = player.dead;
  if (dead && Math.floor(t * 9) % 2 === 1) return;

  const px = player.x + CELL / 2;
  const py = player.y + CELL / 2;

  // Stretch/squash on movement
  const moving = player.t < 1;
  const scaleX = moving ? 0.82 : 1;
  const scaleY = moving ? 1.18 : 1;

  ctx.save();
  ctx.translate(px, py);
  ctx.scale(scaleX, scaleY);

  const R = CELL * 0.34;
  const glo = dead ? '#ff0000' : '#ffe066';

  ctx.shadowColor = glo;
  ctx.shadowBlur  = dead ? 20 : 12;

  // ── Body (white/cream) ──
  ctx.fillStyle = dead ? '#cc2222' : '#f5f0d0';
  ctx.beginPath();
  ctx.ellipse(0, R * 0.1, R, R * 0.88, 0, 0, Math.PI * 2);
  ctx.fill();

  // ── Wing left ──
  ctx.fillStyle = dead ? '#991111' : '#e8e0b0';
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.ellipse(-R * 0.82, R * 0.12, R * 0.28, R * 0.5, -0.45, 0, Math.PI * 2);
  ctx.fill();

  // ── Wing right ──
  ctx.beginPath();
  ctx.ellipse( R * 0.82, R * 0.12, R * 0.28, R * 0.5,  0.45, 0, Math.PI * 2);
  ctx.fill();

  // ── Head ──
  ctx.fillStyle = dead ? '#cc2222' : '#f5f0d0';
  ctx.shadowColor = glo;
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.ellipse(0, -R * 0.72, R * 0.52, R * 0.46, 0, 0, Math.PI * 2);
  ctx.fill();

  // ── Comb (3 bumps on top) ──
  ctx.fillStyle = dead ? '#880000' : '#ff3333';
  ctx.shadowColor = dead ? '#ff0000' : '#ff3333';
  ctx.shadowBlur = dead ? 10 : 6;
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath();
    ctx.ellipse(i * R * 0.22, -R * 1.22 + Math.abs(i) * R * 0.08, R * 0.13, R * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Wattle (chin blob) ──
  ctx.fillStyle = dead ? '#880000' : '#ff4444';
  ctx.beginPath();
  ctx.ellipse(0, -R * 0.36, R * 0.13, R * 0.17, 0, 0, Math.PI * 2);
  ctx.fill();

  // ── Beak ──
  ctx.fillStyle = dead ? '#664400' : '#ffaa00';
  ctx.shadowColor = dead ? '#440000' : '#ff8800';
  ctx.shadowBlur = 5;
  ctx.beginPath();
  ctx.moveTo(-R * 0.18, -R * 0.72);
  ctx.lineTo( R * 0.18, -R * 0.72);
  ctx.lineTo(0, -R * 0.5);
  ctx.closePath();
  ctx.fill();

  // ── Eyes ──
  const eyeY = -R * 0.84;
  const eyeOX = R * 0.26;
  const eyeR = R * 0.14;

  ctx.fillStyle = '#111';
  ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.arc(-eyeOX, eyeY, eyeR, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc( eyeOX, eyeY, eyeR, 0, Math.PI * 2); ctx.fill();

  if (!dead) {
    // Shine
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-eyeOX + eyeR * 0.3, eyeY - eyeR * 0.3, eyeR * 0.35, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( eyeOX + eyeR * 0.3, eyeY - eyeR * 0.3, eyeR * 0.35, 0, Math.PI * 2); ctx.fill();

    // Legs
    ctx.strokeStyle = '#ffaa00';
    ctx.lineWidth = R * 0.12;
    ctx.shadowColor = '#ff8800';
    ctx.shadowBlur = 4;
    ctx.lineCap = 'round';

    // Left leg
    ctx.beginPath();
    ctx.moveTo(-R * 0.3, R * 0.9);
    ctx.lineTo(-R * 0.3, R * 1.35);
    ctx.moveTo(-R * 0.3, R * 1.35);
    ctx.lineTo(-R * 0.55, R * 1.5);
    ctx.moveTo(-R * 0.3, R * 1.35);
    ctx.lineTo(-R * 0.1,  R * 1.52);
    ctx.stroke();

    // Right leg
    ctx.beginPath();
    ctx.moveTo( R * 0.3, R * 0.9);
    ctx.lineTo( R * 0.3, R * 1.35);
    ctx.moveTo( R * 0.3, R * 1.35);
    ctx.lineTo( R * 0.55, R * 1.5);
    ctx.moveTo( R * 0.3, R * 1.35);
    ctx.lineTo( R * 0.1,  R * 1.52);
    ctx.stroke();
  } else {
    // X eyes
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = eyeR * 0.7;
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 8;
    for (const ex of [-eyeOX, eyeOX]) {
      ctx.beginPath();
      ctx.moveTo(ex - eyeR * 0.6, eyeY - eyeR * 0.6);
      ctx.lineTo(ex + eyeR * 0.6, eyeY + eyeR * 0.6);
      ctx.moveTo(ex + eyeR * 0.6, eyeY - eyeR * 0.6);
      ctx.lineTo(ex - eyeR * 0.6, eyeY + eyeR * 0.6);
      ctx.stroke();
    }
  }

  ctx.restore();
}

// ─────────────────────────────────────────────
//  Helpers
// ─────────────────────────────────────────────
function rrect(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function lighten(hex, amt) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,Math.round(r+255*amt))},${Math.min(255,Math.round(g+255*amt))},${Math.min(255,Math.round(b+255*amt))})`;
}

// ─────────────────────────────────────────────
//  Boot
// ─────────────────────────────────────────────
syncPlayerPixels();
requestAnimationFrame(loop);
</script>
